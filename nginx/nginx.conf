# Prod reverse proxy — fronts the API ONLY. The web app is hosted on Vercel
# (its own domain) and calls this api domain cross-origin (cookie SameSite=None;Secure).
# TLS terminates here (Let's Encrypt) — required for the cross-origin Secure cookie.

upstream badminton_api {
    server api:3001;
}

server {
    listen 80;
    server_name api.example.com; # replace with real api domain

    # REST
    location / {
        proxy_pass         http://badminton_api;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Socket.IO (websocket upgrade)
    location /socket.io/ {
        proxy_pass         http://badminton_api;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # Keep long-lived scoreboard sockets alive (default 60s would drop idle connections).
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
