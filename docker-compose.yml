# Dev stack for badminton-api: MongoDB single-node replica set (required for multi-doc
# transactions) + the API. The mongo healthcheck self-initiates the replica set.
services:
  mongo:
    image: mongo:7
    command: ['--replSet', 'rs0', '--bind_ip_all']
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    healthcheck:
      # Initiate RS once, then report healthy when PRIMARY is elected.
      test: >
        mongosh --quiet --eval "
          try { rs.status().ok }
          catch (e) { rs.initiate({_id:'rs0',members:[{_id:0,host:'localhost:27017'}]}) }
        "
      interval: 5s
      timeout: 30s
      retries: 30
      start_period: 5s

  # Local S3 (MinIO) for dev — stands in for DigitalOcean Spaces. Console at :9001.
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 5s
      timeout: 20s
      retries: 20

  # Create the dev bucket + make it public-read (so banner/logo URLs resolve).
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb -p local/badminton-dev &&
      mc anonymous set download local/badminton-dev &&
      echo 'minio bucket ready'
      "

  api:
    build: .
    env_file: .env
    environment:
      # Override host for in-network access; directConnection lets us talk to the
      # single-node RS without resolving the advertised member host.
      MONGO_URI: mongodb://mongo:27017/badminton?replicaSet=rs0&directConnection=true
    ports:
      - '3001:3001'
    depends_on:
      mongo:
        condition: service_healthy

volumes:
  mongo_data:
  minio_data:
