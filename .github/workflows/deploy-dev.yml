name: Deploy to Dev Server

on:
  push:
    branches: [main, develop]

jobs:
  deploy:
    runs-on: self-hosted
    environment: dev

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Enable Corepack (Yarn Berry)
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build
        run: yarn build

      - name: Restart service
        run: pm2 restart fb-be --update-env
        env:
          NODE_ENV: production
